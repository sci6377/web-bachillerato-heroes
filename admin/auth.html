<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Autenticación - Panel de Administración</title>
  <script>
    // Manejar el callback de GitHub OAuth
    (function() {
      // Función para obtener parámetros de URL
      function getUrlParams() {
        const params = {};
        const urlSearchParams = new URLSearchParams(window.location.search);
        for (const [key, value] of urlSearchParams.entries()) {
          params[key] = value;
        }
        return params;
      }

      // Verificar si estamos en el callback de GitHub
      const params = getUrlParams();
      
      if (params.code) {
        // Tenemos un código de autorización, enviarlo al opener
        if (window.opener) {
          window.opener.postMessage({
            type: 'authorization-github',
            payload: {
              code: params.code,
              state: params.state
            }
          }, window.location.origin);
          window.close();
        }
      } else if (params.error) {
        // Error en la autorización
        if (window.opener) {
          window.opener.postMessage({
            type: 'authorization-github',
            error: params.error,
            error_description: params.error_description
          }, window.location.origin);
          window.close();
        }
      } else {
        // Mostrar mensaje de carga
        document.body.innerHTML = '<p>Procesando autenticación...</p>';
      }
    })();
  </script>
</head>
<body>
  <p>Autenticando con GitHub...</p>
</body>
</html>
