<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel de Administración</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>
<body>
  <!-- Incluir Decap CMS con versión específica y estable -->
  <script src="https://unpkg.com/decap-cms@3.1.10/dist/decap-cms.js"></script>
  
  <script>
    // Configuración para GitHub OAuth sin servicios externos
    window.CMS_MANUAL_INIT = true;
    
    // Inicializar CMS manualmente
    window.addEventListener('load', () => {
      CMS.init({
        config: {
          backend: {
            name: 'github',
            repo: 'sci6377/web-bachillerato-heroes',
            branch: 'main',
            auth_type: 'pkce'
          }
        }
      });
    });
  </script>
</body>
</html>
